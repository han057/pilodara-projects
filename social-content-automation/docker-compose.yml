services:

  app:
    build: .

    ports:
      - "8000:8000"

    environment:
      OLLAMA_API_BASE_URL: http://ollama:11434

    depends_on:
      ollama:
        condition: service_healthy

  ollama:
    image: ollama/ollama

    ports:
      - "11434:11434"

    volumes:
      - ollama_data:/root/.ollama

    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  ollama_data:

