name: router-smart-wifi6

services:
  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    environment:
      OLLAMA_KEEP_ALIVE: ${OLLAMA_KEEP_ALIVE:--1}
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 15s

  modelos:
    image: ollama/ollama:latest
    restart: "no"
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: http://ollama:11434
      LLM_MODEL: ${LLM_MODEL:-gemma3:4b}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-nomic-embed-text}
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "Comprobando modelo $${LLM_MODEL}..."
        ollama pull "$${LLM_MODEL}"
        echo "Comprobando modelo $${EMBEDDING_MODEL}..."
        ollama pull "$${EMBEDDING_MODEL}"

  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    restart: unless-stopped
    depends_on:
      modelos:
        condition: service_completed_successfully
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
      LLM_MODEL: ${LLM_MODEL:-gemma3:4b}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-nomic-embed-text}
      API_HOST: 0.0.0.0
      API_PORT: 8000
      HUMAN_PHONE: ${HUMAN_PHONE:-900 123 456}
      HUMAN_EMAIL: ${HUMAN_EMAIL:-soporte.smartwifi6@example.com}
      TEMPERATURE: ${TEMPERATURE:-0.2}
      TIMEOUT_SECONDS: ${TIMEOUT_SECONDS:-300}
    command:
      - python
      - -m
      - uvicorn
      - app.main:app
      - --host
      - 0.0.0.0
      - --port
      - "8000"
    ports:
      - "${API_PORT_HOST:-8000}:8000"
    volumes:
      - chroma_data:/app/chroma_db
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - >-
          import urllib.request;
          urllib.request.urlopen("http://127.0.0.1:8000/health", timeout=5)
      interval: 10s
      timeout: 6s
      retries: 60
      start_period: 90s

  streamlit:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    environment:
      API_BASE_URL: http://api:8000
      TIMEOUT_SECONDS: ${TIMEOUT_SECONDS:-300}
    command:
      - python
      - -m
      - streamlit
      - run
      - streamlit_app.py
      - --server.address
      - 0.0.0.0
      - --server.port
      - "8501"
      - --server.headless
      - "true"
      - --browser.gatherUsageStats
      - "false"
    ports:
      - "${STREAMLIT_PORT_HOST:-8501}:8501"
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - >-
          import urllib.request;
          urllib.request.urlopen("http://127.0.0.1:8501/_stcore/health", timeout=5)
      interval: 10s
      timeout: 6s
      retries: 30
      start_period: 30s

volumes:
  ollama_data:
    name: router_smart_wifi6_ollama
  chroma_data:
    name: router_smart_wifi6_chroma
