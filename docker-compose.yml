# ---------------------------------------------------------------------------
# Orquestador de la "Píldora AI"
#
# Un único Ollama compartido + un servicio por proyecto, todos en la misma
# red interna (ai_net). Cada proyecto habla con Ollama por el nombre de
# servicio: http://ollama:11434
#
# Para sumar un proyecto nuevo, copiá el bloque de un servicio existente:
#   - build: ./<carpeta-del-proyecto>
#   - publicá su puerto en uno libre del host (8002, 8003, ...)
#   - apuntá su variable de URL de Ollama a http://ollama:11434
#   - agregalo a la red ai_net y a depends_on de ollama
# ---------------------------------------------------------------------------

services:
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"          # acceso opcional desde el host
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0:11434
    networks:
      - ai_net
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- Modelos compartidos --------------------------------------------------
  # Descarga (one-shot) de los modelos usados por los proyectos en el Ollama
  # compartido. La mayoría usa gemma3:4b + nomic-embed-text; TravelPlanner usa
  # qwen3:1.7b (más nomic-embed-text para su RAG). Un único puller los baja
  # todos. Termina solo; los servicios que necesitan modelos dependen de su
  # finalización.
  modelos:
    image: ollama/ollama:latest
    restart: "no"
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      - OLLAMA_HOST=http://ollama:11434
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        ollama pull gemma3:4b
        ollama pull qwen3:1.7b
        ollama pull nomic-embed-text
    networks:
      - ai_net

  # --- FinGuard (análisis de riesgo financiero multi-agente) ----------------
  # Usa los modelos gemma3:4b + nomic-embed-text en el Ollama compartido,
  # la API FastAPI (main.py) y la UI Streamlit (interface_gui.py).
  # La app lee OLLAMA_HOST, LLM_MODEL y FMP_API_KEY (Financial Modeling Prep).

  # API FastAPI (orquestación LangGraph + RAG sobre ChromaDB).
  finguard:
    build: ./FinGuard
    depends_on:
      modelos:
        condition: service_completed_successfully
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - LLM_MODEL=gemma3:4b
      - EMBED_MODEL=nomic-embed-text
      # Definí FMP_API_KEY en tu entorno o en un .env junto a este compose.
      - FMP_API_KEY=${FMP_API_KEY:-}
    ports:
      - "8000:8000"
    volumes:
      - finguard_data:/app/data        # ChromaDB persistente
      - finguard_docs:/app/docs        # filings SEC descargados
    networks:
      - ai_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8000/health"]
      interval: 10s
      timeout: 6s
      retries: 30
      start_period: 60s

  # UI Streamlit de FinGuard (8501 ya lo usa customersupport-streamlit).
  finguard-streamlit:
    build: ./FinGuard
    depends_on:
      finguard:
        condition: service_healthy
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - LLM_MODEL=gemma3:4b
      - EMBED_MODEL=nomic-embed-text
      - FMP_API_KEY=${FMP_API_KEY:-}
    command:
      - streamlit
      - run
      - interface_gui.py
      - --server.address
      - 0.0.0.0
      - --server.port
      - "8501"
      - --server.headless
      - "true"
    ports:
      - "8502:8501"
    volumes:
      - finguard_data:/app/data
      - finguard_docs:/app/docs
    networks:
      - ai_net

  # --- TravelPlanner (planificador de viajes multi-agente) ------------------
  # A diferencia del resto, este proyecto persiste sesiones/mensajes en
  # PostgreSQL (servicio travelplanner-db). Usa qwen3:1.7b (LLM) +
  # nomic-embed-text (embeddings RAG) en el Ollama compartido. App FastAPI
  # (api.main:app) que también sirve la UI estática en /. Lee
  # OLLAMA_API_BASE_URL, OLLAMA_MODEL, DATABASE_URL y RAPIDAPI_KEY (Booking
  # via RapidAPI: definila en tu entorno o en un .env junto a este compose).

  # Base de datos PostgreSQL de TravelPlanner.
  travelplanner-db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      - POSTGRES_USER=travelplanner
      - POSTGRES_PASSWORD=travelplanner
      - POSTGRES_DB=travelplanner
    volumes:
      - travelplanner_pgdata:/var/lib/postgresql/data
    networks:
      - ai_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U travelplanner -d travelplanner"]
      interval: 5s
      timeout: 5s
      retries: 10

  travelplanner:
    build: ./travelplanner
    depends_on:
      modelos:
        condition: service_completed_successfully
      travelplanner-db:
        condition: service_healthy
    environment:
      - OLLAMA_API_BASE_URL=http://ollama:11434
      - OLLAMA_MODEL=qwen3:1.7b
      - DATABASE_URL=postgresql://travelplanner:travelplanner@travelplanner-db:5432/travelplanner
      - RAPIDAPI_KEY=${RAPIDAPI_KEY:-}
      - PYTHONUNBUFFERED=1
    ports:
      - "8001:8000"            # 8000 ya lo usa finguard
    networks:
      - ai_net
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - >-
          import urllib.request;
          urllib.request.urlopen("http://127.0.0.1:8000/health/", timeout=5)
      interval: 10s
      timeout: 6s
      retries: 30
      start_period: 30s

  # --- CustomerSupport (Router Smart WiFi 6) --------------------------------
  # Este proyecto necesita DOS contenedores (API FastAPI + UI Streamlit) y los
  # modelos gemma3:4b y nomic-embed-text descargados en el Ollama compartido
  # (los descarga el servicio `modelos`).

  # API FastAPI (lógica de negocio: grafo LangGraph + RAG sobre ChromaDB).
  customersupport-api:
    build:
      context: ./CustomerSupportProject
      dockerfile: docker/Dockerfile
    depends_on:
      modelos:
        condition: service_completed_successfully
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - LLM_MODEL=gemma3:4b
      - EMBEDDING_MODEL=nomic-embed-text
      - API_HOST=0.0.0.0
      - API_PORT=8000
      - TIMEOUT_SECONDS=300
    command:
      - python
      - -m
      - uvicorn
      - app.main:app
      - --host
      - 0.0.0.0
      - --port
      - "8000"
    ports:
      - "8002:8000"            # 8000 finguard, 8001 travelplanner
    volumes:
      - customersupport_chroma:/app/chroma_db
    networks:
      - ai_net
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - >-
          import urllib.request;
          urllib.request.urlopen("http://127.0.0.1:8000/health", timeout=5)
      interval: 10s
      timeout: 6s
      retries: 60
      start_period: 90s

  # UI Streamlit (punto de entrada para el usuario).
  customersupport-streamlit:
    build:
      context: ./CustomerSupportProject
      dockerfile: docker/Dockerfile
    depends_on:
      customersupport-api:
        condition: service_healthy
    environment:
      - API_BASE_URL=http://customersupport-api:8000
      - TIMEOUT_SECONDS=300
    command:
      - python
      - -m
      - streamlit
      - run
      - streamlit_app.py
      - --server.address
      - 0.0.0.0
      - --server.port
      - "8501"
      - --server.headless
      - "true"
      - --browser.gatherUsageStats
      - "false"
    ports:
      - "8501:8501"
    networks:
      - ai_net

  # --- Social Content Automation (generación de campañas multi-agente) ------
  # App FastAPI única (main.py). Usa gemma3:4b (chat) + nomic-embed-text
  # (embeddings RAG sobre vectorstore ChromaDB ya incluido en la imagen).
  # Lee OLLAMA_API_BASE_URL para llegar al Ollama compartido.
  social-content:
    build: ./social-content-automation
    depends_on:
      modelos:
        condition: service_completed_successfully
    environment:
      - OLLAMA_API_BASE_URL=http://ollama:11434
    ports:
      - "8003:8000"            # 8000 finguard, 8001 travelplanner, 8002 cs-api
    networks:
      - ai_net
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - >-
          import urllib.request;
          urllib.request.urlopen("http://127.0.0.1:8000/", timeout=5)
      interval: 10s
      timeout: 6s
      retries: 30
      start_period: 30s

  # --- Optimizador CV (optimización de currículums ATS multi-agente) --------
  # App FastAPI única (api.main). Usa gemma3:4b (LLM) + nomic-embed-text
  # (embeddings RAG). Indexa las ofertas en ChromaDB al arrancar (persistido
  # en volumen). Lee OLLAMA_API_BASE_URL para llegar al Ollama compartido.
  optimizador-cv:
    build: ./optimizador-cv
    depends_on:
      modelos:
        condition: service_completed_successfully
    environment:
      - OLLAMA_API_BASE_URL=http://ollama:11434
    ports:
      - "8004:8000"            # 8003 social-content, 8002 cs-api, 8001 tp, 8000 fg
    volumes:
      - optimizadorcv_chroma:/app/chroma_db
    networks:
      - ai_net
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - >-
          import urllib.request;
          urllib.request.urlopen("http://127.0.0.1:8000/health", timeout=5)
      interval: 10s
      timeout: 6s
      retries: 30
      start_period: 30s

  # --- MedMindAgents (asistente médico RAG sobre manuales clínicos) ---------
  # App FastAPI única (main.py). Usa gemma3:4b (LLM) + nomic-embed-text
  # (embeddings RAG sobre los manuales en docs/, indexados en ChromaDB).
  # El índice ChromaDB ya viene poblado y horneado en la imagen (chroma_db/),
  # así que arranca sin necesidad de re-indexar. Lee OLLAMA_API_BASE_URL.
  medmindagents:
    build: ./MedMindAgents
    depends_on:
      modelos:
        condition: service_completed_successfully
    environment:
      - OLLAMA_API_BASE_URL=http://ollama:11434
    ports:
      - "8005:8000"            # 8004 optimizador-cv, 8003 social-content, ...
    networks:
      - ai_net
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - >-
          import urllib.request;
          urllib.request.urlopen("http://127.0.0.1:8000/health", timeout=5)
      interval: 10s
      timeout: 6s
      retries: 30
      start_period: 30s

  # --- Próximos proyectos: duplicar el bloque de arriba ---------------------
  # nuevo_proyecto:
  #   build: ./nuevo_proyecto
  #   ports:
  #     - "8002:8000"
  #   depends_on:
  #     ollama:
  #       condition: service_healthy
  #   environment:
  #     - OLLAMA_URL=http://ollama:11434
  #   networks:
  #     - ai_net

volumes:
  ollama_data:
  customersupport_chroma:
  finguard_data:
  finguard_docs:
  optimizadorcv_chroma:
  travelplanner_pgdata:

networks:
  ai_net:
    driver: bridge
